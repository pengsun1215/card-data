name: Update Quarterly Categories

on:
  # Run on the 1st of Jan, Apr, Jul, Oct at 9am UTC
  schedule:
    - cron: '0 9 1 1,4,7,10 *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scrape_quarterly.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update quarterly categories [automated]'
          file_pattern: 'quarterly_categories.json'
